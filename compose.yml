services:
  pgadmin_db:
    image: postgres:17
    container_name: pgadmin_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PGADMIN_DATABASE_PASSWORD}
    command:
      - postgres
      - -c
      - logging_collector=on
      - -c
      - log_directory=/var/log/postgresql
      - -c
      - log_filename=postgresql-%Y-%m-%d.log
      - -c
      - log_file_mode=0644
    volumes:
      - ./volumes/pgadmin_db/data:/var/lib/postgresql/data:z
      - ./volumes/logs/pgadmin_db:/var/log/postgresql:z
      - ./config/pgadmin_db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nocodenation_playground_network

  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres
    restart: unless-stopped
    user: "0:0"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: api_user
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    command:
      - postgres
      - -c
      - logging_collector=on
      - -c
      - log_directory=/var/log/postgresql
      - -c
      - log_filename=postgresql-%Y-%m-%d.log
      - -c
      - log_file_mode=0644
    volumes:
      - ./volumes/postgres/data:/var/lib/postgresql/data:z
      - ./volumes/logs/postgres:/var/log/postgresql:z
      - ./config/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nocodenation_playground_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    user: "0:0"
    volumes:
      - ./volumes/pgadmin:/var/lib/pgadmin:z
      - ./volumes/logs/pgadmin:/var/log/pgadmin:z
      - ./config/pgadmin/config_distro.py:/pgadmin4/config_distro.py
      - ./config/pgadmin/config_local.py:/pgadmin4/config_local.py
      - ./config/pgadmin/webserver.py:/pgadmin4/pgadmin/authenticate/webserver.py
      - ./config/pgadmin/servers.json:/pgadmin4/servers.json
      - ./config/pgadmin/pgpass:/pgadmin4/pgpass
    depends_on:
        pgadmin_db:
          condition: service_healthy
        postgres:
          condition: service_healthy
#    ports:
#      - "8100:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
      PGADMIN_CONFIG_WTF_CSRF_ENABLED: "False"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_PASSFILE_PATH: /pgadmin4/pgpass
    networks:
      - nocodenation_playground_network

  postgrest_app:
    image: postgrest/postgrest
    container_name: postgrest_app
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://api_user:${DATABASE_PASSWORD}@postgres:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: api_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:8101
      PGRST_JWT_SECRET: ${POSTGREST_JWT_SECTET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nocodenation_playground_network

  proxy:
    image: nginx:latest
    container_name: proxy
    restart: unless-stopped
    ports:
      - "8100:80"
      - "8101:81"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./volumes/logs/proxy:/var/log/nginx:z
    depends_on:
      - postgrest_app
      - pgadmin
    networks:
      - nocodenation_playground_network

  swagger:
    image: swaggerapi/swagger-ui
    container_name: swagger
    restart: unless-stopped
    environment:
      API_URL: http://localhost:8101/
    ports:
      - "8102:8080"
    volumes:
      - ./volumes/logs/swagger:/var/log/nginx:z
    depends_on:
      - proxy
    networks:
      - nocodenation_playground_network

  opencode:
    image: webdb-playground/opencode:latest
    container_name: opencode
    restart: unless-stopped
    ports:
      - "8103:4096"
    extra_hosts:
      - "dgx_spark:${OPENCODE_OLLAMA_HOST_IP:-127.0.0.1}"
      - "embedding_host:${OPENCODE_EMBEDDING_HOST_IP:-127.0.0.1}"
    environment:
      OPENCODE_SERVER_PORT: "4096"
      OPENCODE_MODEL: ${OPENCODE_MODEL:-}
      OPENCODE_USERNAME: ${OPENCODE_USERNAME:-}
      OPENCODE_PASSWORD: ${OPENCODE_PASSWORD:-}
      OPENCODE_ANTHROPIC_KEY: ${OPENCODE_ANTHROPIC_KEY:-}
      OPENCODE_OPENAI_KEY: ${OPENCODE_OPENAI_KEY:-}
      OPENCODE_OLLAMA_HOST: ${OPENCODE_OLLAMA_HOST:-}
      OPENCODE_EMBEDDING_HOST: ${OPENCODE_EMBEDDING_HOST:-}
      OPENCODE_EMBEDDING_MODEL: ${OPENCODE_EMBEDDING_MODEL:-}
      OPENCODE_TIMEOUT: ${OPENCODE_TIMEOUT:-600000}
      OPENCODE_CHUNK_TIMEOUT: ${OPENCODE_CHUNK_TIMEOUT:-120000}
      POSTGREST_API_KEY: ${API_KEY:-}
    volumes:
      - ./config/opencode/instructions.md:/opencode/instructions.md:ro
      - ./config/opencode/skills:/root/.config/opencode/skills
      - ./config/opencode/package.json:/root/.config/opencode/package.json
      - ./config/opencode/tools:/root/.config/opencode/tools:ro
      - ./volumes/logs/postgres:/logs/postgres:ro
      - ./volumes/logs/pgadmin_db:/logs/pgadmin_db:ro
      - ./volumes/logs/pgadmin:/logs/pgadmin:ro
      - ./volumes/logs/proxy:/logs/proxy:ro
      - ./volumes/logs/swagger:/logs/swagger:ro
      - ./volumes/logs/bun_runner:/logs/bun_runner:ro
      - ./volumes/app:/app
      - ./volumes/data:/data
    networks:
      - nocodenation_playground_network

  bun_runner:
    image: webdb-playground/bun-runner:latest
    container_name: bun_runner
    restart: unless-stopped
    ports:
      - "8104:3000"
    volumes:
      - ./volumes/app:/app
      - ./volumes/data:/data
      - ./volumes/build_info:/build_info
      - ./volumes/logs/bun_runner:/logs
    environment:
      POSTGREST_API_KEY: ${API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "bash -c '> /dev/tcp/127.0.0.1/3000'"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 5m
    networks:
      - nocodenation_playground_network

networks:
  nocodenation_playground_network:
    name: nocodenation_playground_network
    external: true
