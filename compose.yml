services:
  pgadmin_db:
    image: postgres:17
    container_name: pgadmin_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PGADMIN_DATABASE_PASSWORD}
    command:
      - postgres
      - -c
      - logging_collector=on
      - -c
      - log_directory=/var/log/postgresql
      - -c
      - log_filename=postgresql-%Y-%m-%d.log
      - -c
      - log_file_mode=0644
    volumes:
      - ./volumes/pgadmin_db/data:/var/lib/postgresql/data:z
      - ./volumes/logs/pgadmin_db:/var/log/postgresql:z
      - ./config/pgadmin_db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nocodenation_all_in_wonder_network

  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres
    restart: unless-stopped
    user: "0:0"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: api_user
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    command:
      - postgres
      - -c
      - logging_collector=on
      - -c
      - log_directory=/var/log/postgresql
      - -c
      - log_filename=postgresql-%Y-%m-%d.log
      - -c
      - log_file_mode=0644
    volumes:
      - ./volumes/postgres/data:/var/lib/postgresql/data:z
      - ./volumes/logs/postgres:/var/log/postgresql:z
      - ./config/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nocodenation_all_in_wonder_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    user: "0:0"
    volumes:
      - ./volumes/pgadmin:/var/lib/pgadmin:z
      - ./volumes/logs/pgadmin:/var/log/pgadmin:z
      - ./config/pgadmin/config_distro.py:/pgadmin4/config_distro.py
      - ./config/pgadmin/config_local.py:/pgadmin4/config_local.py
      - ./config/pgadmin/webserver.py:/pgadmin4/pgadmin/authenticate/webserver.py
      - ./config/pgadmin/servers.json:/pgadmin4/servers.json
      - ./config/pgadmin/pgpass:/pgadmin4/pgpass
    depends_on:
        pgadmin_db:
          condition: service_healthy
        postgres:
          condition: service_healthy
#    ports:
#      - "8100:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
      PGADMIN_CONFIG_WTF_CSRF_ENABLED: "False"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_PASSFILE_PATH: /pgadmin4/pgpass
    networks:
      - nocodenation_all_in_wonder_network

  postgrest_app:
    image: postgrest/postgrest
    container_name: postgrest_app
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://api_user:${DATABASE_PASSWORD}@postgres:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: api_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: http://postgrest.localhost:8888
      PGRST_JWT_SECRET: ${POSTGREST_JWT_SECTET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nocodenation_all_in_wonder_network

  proxy:
    image: nginx:latest
    container_name: proxy
    restart: unless-stopped
    ports:
      - "8888:8888"
      - "8833:8833"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/openproject/theme:/usr/share/nginx/custom-theme:ro
      - ./volumes/logs/proxy:/var/log/nginx:z
      - ./volumes/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - postgrest_app
      - pgadmin
      - openproject-web
      - swagger
      - opencode
      - bun_runner
    networks:
      nocodenation_all_in_wonder_network:
        aliases:
          - pgadmin.localhost
          - postgrest.localhost
          - swagger.localhost
          - opencode.localhost
          - app.localhost
