  openclaw-gateway:
    image: liquidupstart/openclaw:${APP_ID:-0}
    build: .
    user: "0:0"
    container_name: openclaw-gateway-${APP_ID:-0}
    env_file:
      - path: config/openclaw/.env
        required: false
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-}
      OTEL_SEMCONV_STABILITY_OPT_IN: ${OTEL_SEMCONV_STABILITY_OPT_IN:-}
      OPENCLAW_OTEL_PRELOADED: ${OPENCLAW_OTEL_PRELOADED:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OPENCLAW_CLAUDE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      POSTGREST_API_KEY: ${API_KEY:-}
      POSTGREST_URL: ${POSTGREST_URL:-http://postgrest_app:3000}
      LOCAL_LLM_API_BASE: ${LOCAL_LLM_API_BASE:-}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-}
      MINIMAX_GROUP_ID: ${MINIMAX_GROUP_ID:-}
      ENABLE_GITHUB_COPILOT: ${ENABLE_GITHUB_COPILOT:-}
      LIQUID_USERNAME: ${LIQUID_USERNAME:-}
      LIQUID_PASSWORD: ${LIQUID_PASSWORD:-}
      SYSTEM_HTTP_PORT: ${SYSTEM_HTTP_PORT:-8888}
      SYSTEM_HTTPS_PORT: ${SYSTEM_HTTPS_PORT:-8833}
      LIQUID_KEYSTORE_PASSWORD: ${LIQUID_KEYSTORE_PASSWORD}
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ./volumes/_openclaw:/home/node/.openclaw
      - ./volumes/_openclaw/workspace:/home/node/.openclaw/workspace
      - ./volumes/_openclaw-auth-profile-secrets:/home/node/.config/openclaw
      - ./volumes/_openclaw-claude:/home/node/.claude
      - ./config/agents/skills:/home/node/.claude/skills:ro
      - ./config/agents/skills:/home/node/.openclaw/skills:ro
      - ./config/openclaw/plugins:/opt/plugins:ro
      - ./config/openclaw/claude_tools:/home/node/.claude-tools:ro
      - ./volumes/data:/data
      - ./volumes/bun_app:/bun_app
      - ./volumes/python_extensions:/opt/python_extensions
      - ./volumes/nar_extensions:/opt/nar_extensions
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "${LOCAL_LLM_HOST:-local_llm}:${LOCAL_LLM_HOST_IP:-127.0.0.1}"
    init: true
    restart: unless-stopped
    tmpfs:
      # Shadow state plugins dir with tmpfs (normal perms, not the Docker Desktop 777 share)
      # so neither service persists a world-writable plugin OpenClaw's loader would block.
      - /home/node/.openclaw/plugins
    # Docker-Desktop fix: host plugins bind mount is mode 777 and OpenClaw refuses world-writable
    # plugins, so they're mounted read-only at /opt/plugins and copied at startup to a container-local
    # dir with normal perms; plugins.load.paths points at /home/node/openclaw-plugins (see openclaw.sh).
    command:
      - /bin/sh
      - -lc
      - |
        mkdir -p /home/node/openclaw-plugins
        cp -a /opt/plugins/. /home/node/openclaw-plugins/
        chmod -R go-w /home/node/openclaw-plugins
        exec node dist/index.js gateway --bind lan --port 18789
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      nocodenation_liquid_upstart_network:

  openclaw-cli:
    image: liquidupstart/openclaw:${APP_ID:-0}
    network_mode: "service:openclaw-gateway"
    user: "0:0"
    container_name: openclaw-cli-${APP_ID:-0}
    env_file:
      - path: config/openclaw/.env
        required: false
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OPENCLAW_CLAUDE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      POSTGREST_API_KEY: ${API_KEY:-}
      POSTGREST_URL: ${POSTGREST_URL:-http://postgrest_app:3000}
      LOCAL_LLM_API_BASE: ${LOCAL_LLM_API_BASE:-}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-}
      MINIMAX_GROUP_ID: ${MINIMAX_GROUP_ID:-}
      ENABLE_GITHUB_COPILOT: ${ENABLE_GITHUB_COPILOT:-}
      LIQUID_USERNAME: ${LIQUID_USERNAME:-}
      LIQUID_PASSWORD: ${LIQUID_PASSWORD:-}
      SYSTEM_HTTP_PORT: ${SYSTEM_HTTP_PORT:-8888}
      SYSTEM_HTTPS_PORT: ${SYSTEM_HTTPS_PORT:-8833}
      LIQUID_KEYSTORE_PASSWORD: ${LIQUID_KEYSTORE_PASSWORD}
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
    volumes:
      - ./volumes/_openclaw:/home/node/.openclaw
      - ./volumes/_openclaw/workspace:/home/node/.openclaw/workspace
      - ./volumes/_openclaw-auth-profile-secrets:/home/node/.config/openclaw
      - ./volumes/_openclaw-claude:/home/node/.claude
      - ./config/agents/skills:/home/node/.claude/skills:ro
      - ./config/agents/skills:/home/node/.openclaw/skills:ro
      - ./config/openclaw/plugins:/opt/plugins:ro
      - ./config/openclaw/claude_tools:/home/node/.claude-tools:ro
      - ./volumes/data:/data
      - ./volumes/python_extensions:/opt/python_extensions
      - ./volumes/nar_extensions:/opt/nar_extensions
    stdin_open: true
    tty: true
    init: true
    tmpfs:
      # See openclaw-gateway: keep state plugins dir off the 777 share so `openclaw setup`
      # doesn't persist a world-writable plugin the gateway would then refuse to load.
      - /home/node/.openclaw/plugins
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

networks:
  nocodenation_liquid_upstart_network:
    name: nocodenation_liquid_upstart_network_${SYSTEM_HTTP_PORT:-8888}

volumes:
  nextcloud_html:
    name: nextcloud_html_${APP_ID:-0}
