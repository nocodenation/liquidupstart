  swagger:
    image: swaggerapi/swagger-ui
    container_name: swagger
    restart: unless-stopped
    environment:
      API_URL: http://postgrest.localhost:${SYSTEM_HTTP_PORT:-8888}/
    volumes:
      - ./volumes/logs/swagger:/var/log/nginx:z
    networks:
      - nocodenation_all_in_wonder_network

  opencode:
    image: all-in-wonder/opencode:latest
    container_name: opencode
    restart: unless-stopped
    extra_hosts:
      - "dgx_spark:${OPENCODE_OLLAMA_HOST_IP:-127.0.0.1}"
      - "embedding_host:${OPENCODE_EMBEDDING_HOST_IP:-127.0.0.1}"
    environment:
      OPENCODE_SERVER_PORT: "4096"
      OPENCODE_MODEL: ${OPENCODE_MODEL:-}
      OPENCODE_USERNAME: ${OPENCODE_USERNAME:-}
      OPENCODE_PASSWORD: ${OPENCODE_PASSWORD:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENCODE_OLLAMA_HOST: ${OPENCODE_OLLAMA_HOST:-}
      OPENCODE_EMBEDDING_HOST: ${OPENCODE_EMBEDDING_HOST:-}
      OPENCODE_EMBEDDING_MODEL: ${OPENCODE_EMBEDDING_MODEL:-}
      OPENCODE_TIMEOUT: ${OPENCODE_TIMEOUT:-600000}
      OPENCODE_CHUNK_TIMEOUT: ${OPENCODE_CHUNK_TIMEOUT:-120000}
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-}
      POSTGREST_API_KEY: ${API_KEY:-}
      NIFI_USERNAME: ${NIFI_USERNAME:-}
      NIFI_PASSWORD: ${NIFI_PASSWORD:-}
      SYSTEM_HTTP_PORT: ${SYSTEM_HTTP_PORT:-8888}
      SYSTEM_HTTPS_PORT: ${SYSTEM_HTTPS_PORT:-8833}
      NIFI_KEYSTORE_PASSWORD: ${NIFI_KEYSTORE_PASSWORD}
    volumes:
      - ./config/agents/instructions.md:/opencode/instructions.md:ro
      - ./config/agents/skills:/root/.config/opencode/skills
      - ./config/opencode/package.json:/root/.config/opencode/package.json
      - ./config/opencode/tools:/root/.config/opencode/tools:ro
      - ./volumes/logs/postgres:/logs/postgres:ro
      - ./volumes/logs/pgadmin_db:/logs/pgadmin_db:ro
      - ./volumes/logs/pgadmin:/logs/pgadmin:ro
      - ./volumes/logs/proxy:/logs/proxy:ro
      - ./volumes/logs/swagger:/logs/swagger:ro
      - ./volumes/logs/bun_runner:/logs/bun_runner:ro
      - ./volumes/app:/app
      - ./volumes/data:/data
      - ./volumes/python_extensions:/opt/python_extensions
      - ./volumes/nar_extensions:/opt/nar_extensions
    networks:
      - nocodenation_all_in_wonder_network

  bun_runner:
    image: all-in-wonder/bun-runner:latest
    container_name: bun_runner
    restart: unless-stopped
    volumes:
      - ./volumes/app:/app
      - ./volumes/data:/data
      - ./volumes/build_info:/build_info
      - ./volumes/logs/bun_runner:/logs
    environment:
      POSTGREST_API_KEY: ${API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "bash -c '> /dev/tcp/127.0.0.1/3000'"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 5m
    networks:
      - nocodenation_all_in_wonder_network

  openproject-db:
    image: postgres:17
    container_name: openproject-db
    restart: unless-stopped
    volumes:
      - ./volumes/openproject_db:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${OPENPROJECT_DATABASE_PASSWORD}
      POSTGRES_DB: openproject
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d openproject" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - nocodenation_all_in_wonder_network

  openproject-cache:
    image: memcached:1.6-alpine
    container_name: openproject-cache
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "echo stats | nc -w1 127.0.0.1 11211 | grep -q uptime" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nocodenation_all_in_wonder_network

  openproject-web:
    image: openproject/openproject:17-slim
    restart: unless-stopped
    container_name: openproject-web
    environment:
      OPENPROJECT_HTTPS: "false"
      OPENPROJECT_HOST__NAME: "openproject.localhost:${SYSTEM_HTTP_PORT:-8888}"
      OPENPROJECT_HSTS: "false"
      RAILS_CACHE_STORE: "memcache"
      OPENPROJECT_CACHE__MEMCACHE__SERVER: "cache:11211"
      DATABASE_URL: "postgres://postgres:${OPENPROJECT_DATABASE_PASSWORD}@openproject-db/openproject?pool=5&encoding=unicode&reconnect=true"
      POSTGRES_STATEMENT_TIMEOUT: "120000"
      OPENPROJECT_LOG__LEVEL: "warn"
      SECRET_KEY_BASE: ${OPENPROJECT_SECRET_KEY_BASE}
      # set to true to enable the email receiving feature. See ./docker/cron for more options
      IMAP_ENABLED: "false"
      OPENPROJECT_AUTH__SOURCE__SSO_HEADER: "X-OpenProject-User"
      OPENPROJECT_AUTH__SOURCE__SSO_SECRET: "ALL_IN_WONDER_USER"
      OPENPROJECT_DISABLE__PASSWORD__LOGIN: "true"
    volumes:
      - ./volumes/openproject:/var/openproject/assets
      - ./config/openproject/auth_source_sso.rb:/app/app/controllers/concerns/auth_source_sso.rb
      - ./config/openproject/proxy_auth_source.rb:/app/app/models/proxy_auth_source.rb
      - ./config/openproject/patch_theme.sh:/patch/patch_theme.sh:ro
    command: ["bash", "-c", "bash /patch/patch_theme.sh; exec ./docker/prod/web"]
    depends_on:
      openproject-db:
        condition: service_healthy
      openproject-cache:
        condition: service_healthy
      openproject-seeder:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://127.0.0.1:8080/health_checks/default",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - nocodenation_all_in_wonder_network

  openproject-worker:
    image: openproject/openproject:17-slim
    restart: unless-stopped
    container_name: openproject-worker
    environment:
      OPENPROJECT_HTTPS: "false"
      OPENPROJECT_HOST__NAME: "openproject.localhost:${SYSTEM_HTTP_PORT:-8888}"
      OPENPROJECT_HSTS: "false"
      RAILS_CACHE_STORE: "memcache"
      OPENPROJECT_CACHE__MEMCACHE__SERVER: "cache:11211"
      DATABASE_URL: "postgres://postgres:${OPENPROJECT_DATABASE_PASSWORD}@openproject-db/openproject?pool=5&encoding=unicode&reconnect=true"
      POSTGRES_STATEMENT_TIMEOUT: "120000"
      OPENPROJECT_LOG__LEVEL: "warn"
      SECRET_KEY_BASE: ${OPENPROJECT_SECRET_KEY_BASE}
      # set to true to enable the email receiving feature. See ./docker/cron for more options
      IMAP_ENABLED: "false"
      OPENPROJECT_AUTH__SOURCE__SSO_HEADER: "X-OpenProject-User"
      OPENPROJECT_AUTH__SOURCE__SSO_SECRET: "ALL_IN_WONDER_USER"
      OPENPROJECT_DISABLE__PASSWORD__LOGIN: "true"
    volumes:
      - ./volumes/openproject:/var/openproject/assets
      - ./config/openproject/auth_source_sso.rb:/app/app/controllers/concerns/auth_source_sso.rb
      - ./config/openproject/proxy_auth_source.rb:/app/app/models/proxy_auth_source.rb
    depends_on:
      openproject-db:
        condition: service_healthy
      openproject-cache:
        condition: service_healthy
      openproject-seeder:
        condition: service_completed_successfully
    command: "./docker/prod/worker"
    networks:
      - nocodenation_all_in_wonder_network

  openproject-cron:
    image: openproject/openproject:17-slim
    restart: unless-stopped
    container_name: openproject-cron
    environment:
      OPENPROJECT_HTTPS: "false"
      OPENPROJECT_HOST__NAME: "openproject.localhost:${SYSTEM_HTTP_PORT:-8888}"
      OPENPROJECT_HSTS: "false"
      RAILS_CACHE_STORE: "memcache"
      OPENPROJECT_CACHE__MEMCACHE__SERVER: "cache:11211"
      DATABASE_URL: "postgres://postgres:${OPENPROJECT_DATABASE_PASSWORD}@openproject-db/openproject?pool=5&encoding=unicode&reconnect=true"
      POSTGRES_STATEMENT_TIMEOUT: "120000"
      OPENPROJECT_LOG__LEVEL: "warn"
      SECRET_KEY_BASE: ${OPENPROJECT_SECRET_KEY_BASE}
      # set to true to enable the email receiving feature. See ./docker/cron for more options
      IMAP_ENABLED: "false"
      OPENPROJECT_AUTH__SOURCE__SSO_HEADER: "X-OpenProject-User"
      OPENPROJECT_AUTH__SOURCE__SSO_SECRET: "ALL_IN_WONDER_USER"
      OPENPROJECT_DISABLE__PASSWORD__LOGIN: "true"
    volumes:
      - ./volumes/openproject:/var/openproject/assets
      - ./config/openproject/auth_source_sso.rb:/app/app/controllers/concerns/auth_source_sso.rb
      - ./config/openproject/proxy_auth_source.rb:/app/app/models/proxy_auth_source.rb
    depends_on:
      openproject-db:
        condition: service_healthy
      openproject-cache:
        condition: service_healthy
      openproject-seeder:
        condition: service_completed_successfully
    command: "./docker/prod/cron"
    networks:
      - nocodenation_all_in_wonder_network

  openproject-seeder:
    image: openproject/openproject:17-slim
    restart: on-failure
    container_name: openproject-seeder
    environment:
      OPENPROJECT_HTTPS: "false"
      OPENPROJECT_HOST__NAME: "openproject.localhost:${SYSTEM_HTTP_PORT:-8888}"
      OPENPROJECT_HSTS: "false"
      RAILS_CACHE_STORE: "memcache"
      OPENPROJECT_CACHE__MEMCACHE__SERVER: "cache:11211"
      DATABASE_URL: "postgres://postgres:${OPENPROJECT_DATABASE_PASSWORD}@openproject-db/openproject?pool=5&encoding=unicode&reconnect=true"
      POSTGRES_STATEMENT_TIMEOUT: "120000"
      OPENPROJECT_LOG__LEVEL: "warn"
      SECRET_KEY_BASE: ${OPENPROJECT_SECRET_KEY_BASE}
      # set to true to enable the email receiving feature. See ./docker/cron for more options
      IMAP_ENABLED: "false"
      OPENPROJECT_AUTH__SOURCE__SSO_HEADER: "X-OpenProject-User"
      OPENPROJECT_AUTH__SOURCE__SSO_SECRET: "ALL_IN_WONDER_USER"
      OPENPROJECT_DISABLE__PASSWORD__LOGIN: "true"
    volumes:
      - ./volumes/openproject:/var/openproject/assets
      - ./config/openproject/auth_source_sso.rb:/app/app/controllers/concerns/auth_source_sso.rb
      - ./config/openproject/proxy_auth_source.rb:/app/app/models/proxy_auth_source.rb
    depends_on:
        openproject-db:
          condition: service_healthy
    command: "./docker/prod/seeder"
    networks:
      - nocodenation_all_in_wonder_network

  nextcloud-db:
    image: postgres:17
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${NEXTCLOUD_DATABASE_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./volumes/nextcloud_db:/var/lib/postgresql/data
    networks:
      - nocodenation_all_in_wonder_network

  nextcloud-redis:
    image: redis:8
    container_name: nextcloud-redis
    restart: unless-stopped
    volumes:
      - ./volumes/nextcloud_redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"] # Check if Redis responds to PING
      interval: 5s # Check every 5 seconds
      timeout: 3s # Allow 3 seconds for the command to complete
      retries: 5 # Consider unhealthy after 5 consecutive failures
      start_period: 10s
    command: redis-server --requirepass ${NEXTCLOUD_REDIS_PASSWORD}
    networks:
      - nocodenation_all_in_wonder_network

  nextcloud:
    image: nextcloud:stable
    container_name: nextcloud
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${NEXTCLOUD_DATABASE_PASSWORD}
      POSTGRES_HOST: nextcloud-db
      NEXTCLOUD_ADMIN_USER: ${PGADMIN_DEFAULT_EMAIL}
      NEXTCLOUD_ADMIN_PASSWORD: ${PGADMIN_DEFAULT_EMAIL}
      NEXTCLOUD_TRUSTED_DOMAINS: "nextcloud.localhost:${SYSTEM_HTTP_PORT:-8888}"
      REDIS_HOST: nextcloud-redis
      REDIS_HOST_PASSWORD: ${NEXTCLOUD_REDIS_PASSWORD}
      OVERWRITEPROTOCOL: http
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_healthy
    volumes:
      - ./volumes/nextcloud/html:/var/www/html
      - ./volumes/nextcloud/config:/var/www/html/config
      - ./volumes/nextcloud/data:/var/www/html/data
      - ./volumes/nextcloud/custom_apps:/var/www/html/custom_apps
      - ./config/nextcloud/theme:/var/www/html/themes/aiw:ro
      - ./config/nextcloud/no_skeleton.config.php:/tmp/no_skeleton.config.php
      - ./config/nextcloud/sso_block.php:/tmp/sso_block.php
      - ./config/nextcloud/lc_logout_redirect.php:/tmp/lc_logout_redirect.php
      - ./config/nextcloud/session_security_block.php:/tmp/session_security_block.php
      - ./config/nextcloud/pre_install.sh:/docker-entrypoint-hooks.d/pre-installation/pre_install.sh
      - ./config/nextcloud/patch_nextcloud.sh:/docker-entrypoint-hooks.d/before-starting/patch_nextcloud.sh
      - ./config/nextcloud/set_trusted_proxies.sh:/docker-entrypoint-hooks.d/before-starting/set_trusted_proxies.sh
    networks:
      - nocodenation_all_in_wonder_network

  collabora:
    image: collabora/code
    container_name: collabora
    restart: unless-stopped
    cap_add:
      - MKNOD
    environment:
      aliasgroup1: "http://nextcloud.localhost:${SYSTEM_HTTP_PORT:-8888}"
      extra_params: "--o:ssl.enable=false --o:ssl.termination=false --o:mount_jail_tree=false"
      server_name: "nextcloud.localhost:${SYSTEM_HTTP_PORT:-8888}"
      dictionaries: "de_DE en_GB en_US"
      username: "collabora"
      password: "collabora"
      DONT_GEN_SSL_CERT: "true"
    volumes:
      - ./volumes/collabora/fonts:/usr/share/fonts/truetype/custom
      - ./volumes/collabora/fonts:/opt/cool/systemplate/usr/share/fonts/truetype/custom
    networks:
      - nocodenation_all_in_wonder_network

  nifi:
    image: all-in-wonder/nifi:latest
    container_name: nifi
    restart: unless-stopped
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: ${NIFI_USERNAME}
      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_PASSWORD}
      NIFI_WEB_PROXY_HOST: "nifi.localhost:${SYSTEM_HTTPS_PORT:-8833}"
      NIFI_WEB_HTTPS_PORT: ${SYSTEM_HTTPS_PORT:-8833}
      NIFI_WEB_HTTPS_HOST: "0.0.0.0"
    volumes:
      - ./volumes/data:/data
      - ./volumes/python_extensions:/opt/nifi/nifi-current/python_extensions
      - ./volumes/nar_extensions:/opt/nifi/nifi-current/nar_extensions
      - ./volumes/nifi/conf:/opt/nifi/nifi-current/conf
      - ./volumes/nifi/database_repository:/opt/nifi/nifi-current/database_repository
      - ./volumes/nifi/flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - ./volumes/nifi/content_repository:/opt/nifi/nifi-current/content_repository
      - ./volumes/nifi/provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - ./volumes/nifi/state:/opt/nifi/nifi-current/state
      - ./volumes/nginx/certs:/certs:ro
    networks:
      nocodenation_all_in_wonder_network:

  hermes:
    image: all-in-wonder/hermes:latest
    container_name: hermes
    restart: unless-stopped
    extra_hosts:
      - "embedding_host:${OPENCODE_EMBEDDING_HOST_IP:-127.0.0.1}"
    ports:
      - "9119:9119"
      - "8642:8642"
      - "8644:8644"
    volumes:
      - ./volumes/hermes:/root/.hermes
      - ./config/hermes/.env:/opt/.env
      - ./config/hermes/config.yaml:/opt/config.yaml
      - ./config/agents/skills:/opt/custom-skills
      - ./config/agents/instructions.md:/opt/SOUL.md
      - ./config/hermes/plugins/ingest_pdf:/opt/plugins/ingest_pdf:ro
      - ./volumes/data:/data
      - ./volumes/python_extensions:/opt/python_extensions
      - ./volumes/nar_extensions:/opt/nar_extensions
    environment:
      API_SERVER_ENABLED: true
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_KEY: ${HERMES_API_KEY}
      API_SERVER_CORS_ORIGINS: '*'
      WEBHOOK_ENABLED: true
      WEBHOOK_PORT: 8644
      WEBHOOK_SECRET: ${HERMES_API_KEY:-}
      HERMES_DASHBOARD: 1
      HERMES_DASHBOARD_TUI: 1
      HERMES_DASHBOARD_INSECURE: 1
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: 9119
      GATEWAY_ALLOW_ALL_USERS: true
      CUSTOM_SKILLS_FOLDER: /opt/custom-skills
      POSTGREST_API_KEY: ${API_KEY:-}
      POSTGREST_URL: ${POSTGREST_URL:-http://postgrest_app:3000}
      OPENCODE_EMBEDDING_HOST: ${OPENCODE_EMBEDDING_HOST:-}
      OPENCODE_EMBEDDING_MODEL: ${OPENCODE_EMBEDDING_MODEL:-}
      NIFI_USERNAME: ${NIFI_USERNAME:-}
      NIFI_PASSWORD: ${NIFI_PASSWORD:-}
      SYSTEM_HTTP_PORT: ${SYSTEM_HTTP_PORT:-8888}
      SYSTEM_HTTPS_PORT: ${SYSTEM_HTTPS_PORT:-8833}
      NIFI_KEYSTORE_PASSWORD: ${NIFI_KEYSTORE_PASSWORD}
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
    command: ["gateway", "run"]
    networks:
      - nocodenation_all_in_wonder_network

  openclaw-gateway:
    image: all-in-wonder/openclaw:latest
    build: .
    user: "0:0"
    container_name: openclaw-gateway
    env_file:
      - path: config/openclaw/.env
        required: false
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-}
      OTEL_SEMCONV_STABILITY_OPT_IN: ${OTEL_SEMCONV_STABILITY_OPT_IN:-}
      OPENCLAW_OTEL_PRELOADED: ${OPENCLAW_OTEL_PRELOADED:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      POSTGREST_API_KEY: ${API_KEY:-}
      POSTGREST_URL: ${POSTGREST_URL:-http://postgrest_app:3000}
      OPENCODE_EMBEDDING_HOST: ${OPENCODE_EMBEDDING_HOST:-}
      OPENCODE_EMBEDDING_MODEL: ${OPENCODE_EMBEDDING_MODEL:-}
      NIFI_USERNAME: ${NIFI_USERNAME:-}
      NIFI_PASSWORD: ${NIFI_PASSWORD:-}
      SYSTEM_HTTP_PORT: ${SYSTEM_HTTP_PORT:-8888}
      SYSTEM_HTTPS_PORT: ${SYSTEM_HTTPS_PORT:-8833}
      NIFI_KEYSTORE_PASSWORD: ${NIFI_KEYSTORE_PASSWORD}
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ./volumes/_openclaw:/home/node/.openclaw
      - ./volumes/_openclaw/workspace:/home/node/.openclaw/workspace
      - ./volumes/_openclaw-auth-profile-secrets:/home/node/.config/openclaw
      - ./config/agents/skills:/home/node/.openclaw/skills:ro
      - ./config/openclaw/plugins:/home/node/.openclaw/plugins:ro
      - ./volumes/data:/data
      - ./volumes/python_extensions:/opt/python_extensions
      - ./volumes/nar_extensions:/opt/nar_extensions
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "embedding_host:${OPENCODE_EMBEDDING_HOST_IP:-127.0.0.1}"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "lan",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      nocodenation_all_in_wonder_network:

  openclaw-cli:
    image: all-in-wonder/openclaw:latest
    network_mode: "service:openclaw-gateway"
    user: "0:0"
    container_name: openclaw-cli
    env_file:
      - path: config/openclaw/.env
        required: false
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      POSTGREST_API_KEY: ${API_KEY:-}
      POSTGREST_URL: ${POSTGREST_URL:-http://postgrest_app:3000}
      OPENCODE_EMBEDDING_HOST: ${OPENCODE_EMBEDDING_HOST:-}
      OPENCODE_EMBEDDING_MODEL: ${OPENCODE_EMBEDDING_MODEL:-}
      NIFI_USERNAME: ${NIFI_USERNAME:-}
      NIFI_PASSWORD: ${NIFI_PASSWORD:-}
      SYSTEM_HTTP_PORT: ${SYSTEM_HTTP_PORT:-8888}
      SYSTEM_HTTPS_PORT: ${SYSTEM_HTTPS_PORT:-8833}
      NIFI_KEYSTORE_PASSWORD: ${NIFI_KEYSTORE_PASSWORD}
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
    volumes:
      - ./volumes/_openclaw:/home/node/.openclaw
      - ./volumes/_openclaw/workspace:/home/node/.openclaw/workspace
      - ./volumes/_openclaw-auth-profile-secrets:/home/node/.config/openclaw
      - ./config/agents/skills:/home/node/.openclaw/skills:ro
      - ./config/openclaw/plugins:/home/node/.openclaw/plugins:ro
      - ./volumes/data:/data
      - ./volumes/python_extensions:/opt/python_extensions
      - ./volumes/nar_extensions:/opt/nar_extensions
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

networks:
  nocodenation_all_in_wonder_network:
    name: nocodenation_all_in_wonder_network_${SYSTEM_HTTP_PORT:-8888}
