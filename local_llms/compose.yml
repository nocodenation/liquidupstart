name: local_llms

services:
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: local_llm
    command: >-
      --models-preset /models.ini
      --models-max 2
    environment:
      LLAMA_API_KEY: ${LOCAL_LLM_API_KEY:?}
    ports:
      - "8090:8080"
    volumes:
      - ./models.ini:/models.ini:ro
      - ./models:/root/.cache
    gpus: all
    restart: unless-stopped
