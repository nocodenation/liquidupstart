server {
    listen 8100;

    # pgAdmin UI with webserver auto-login
    location / {
        proxy_pass http://pgadmin:80;

        proxy_set_header Host "localhost:8100";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-Authentication-Id "ALL_IN_WONDER_USER_ID";
        proxy_set_header X-Authentication-Email "user@nocodenation.org";
        proxy_set_header X-Authentication-Name "All-In-Wonder User";
        proxy_set_header X-Authentication-Company-Id "NOCODENATION_ORG";
        proxy_set_header X-Authentication-Company-Name "NoCodeNation";
        proxy_set_header X-Authentication-Company-Domain "nocodenation.org";
        proxy_set_header X-OpenProject-User "user@nocodenation.org:ALL_IN_WONDER_USER";
    }
}

server {
    listen 8101;

    # PostgREST API with JWT authentication
    location / {
        # Inject API key as Bearer token if not provided by client
        proxy_set_header Authorization "Bearer API_KEY_PLACEHOLDER";

        proxy_pass http://postgrest_app:3000;
        proxy_set_header Host "localhost:8101";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 8105;

    location ^~ /custom-theme/ {
        alias /usr/share/nginx/custom-theme/;
        access_log off;
        add_header Cache-Control "no-cache";
    }

    # OpenProject with automatic authentication
    location / {
        proxy_pass http://openproject-web:8080;

        proxy_set_header Host "localhost:8105";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-Authentication-Id "ALL_IN_WONDER_USER_ID";
        proxy_set_header X-Authentication-Email "user@nocodenation.org";
        proxy_set_header X-Authentication-Name "All-In-Wonder User";
        proxy_set_header X-Authentication-Company-Id "NOCODENATION_ORG";
        proxy_set_header X-Authentication-Company-Name "NoCodeNation";
        proxy_set_header X-Authentication-Company-Domain "nocodenation.org";
        proxy_set_header X-OpenProject-User "user@nocodenation.org:ALL_IN_WONDER_USER";
    }
}

server {
    listen 8106;

    client_max_body_size 1G;

    # --- Collabora ---

    # Static files (editor UI)
    location ^~ /browser {
        proxy_pass http://collabora:9980;
        proxy_set_header Host "localhost:8106";
    }

    # WOPI discovery
    location ^~ /hosting/discovery {
        proxy_pass http://collabora:9980;
        proxy_set_header Host "localhost:8106";
    }

    # WOPI capabilities
    location ^~ /hosting/capabilities {
        proxy_pass http://collabora:9980;
        proxy_set_header Host "localhost:8106";
    }

    # Admin console WebSocket (must be before the general /cool rule)
    location ^~ /cool/adminws {
        proxy_pass http://collabora:9980;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host "localhost:8106";
        proxy_http_version 1.1;
        proxy_read_timeout 36000s;
    }

    # Document editing WebSocket
    location ~ ^/cool/(.*)/ws$ {
        proxy_pass http://collabora:9980;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host "localhost:8106";
        proxy_http_version 1.1;
        proxy_read_timeout 36000s;
    }

    # Download, upload, and other /cool and /lool requests
    location ~ ^/(c|l)ool {
        proxy_pass http://collabora:9980;
        proxy_set_header Host "localhost:8106";
    }

    location / {
        proxy_pass http://nextcloud:80;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host "localhost:8106";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;

        proxy_set_header X-Authentication-Id "ALL_IN_WONDER_USER_ID";
        proxy_set_header X-Authentication-Email "user@nocodenation.org";
        proxy_set_header X-Authentication-Name "All-In-Wonder User";
        proxy_set_header X-Authentication-Company-Id "NOCODENATION_ORG";
        proxy_set_header X-Authentication-Company-Name "NoCodeNation";
        proxy_set_header X-Authentication-Company-Domain "nocodenation.org";
        proxy_set_header X-OpenProject-User "user@nocodenation.org:ALL_IN_WONDER_USER";
    }

    location /.well-known/carddav {
        return 301 http://$host/remote.php/dav;
    }

    location /.well-known/caldav {
        return 301 http://$host/remote.php/dav;
    }

    location ^~ /.well-known {
        return 301 http://$host/index.php$uri;
    }
}
