server {
    listen 8888;
    server_name pgadmin.localhost;

    location / {
        proxy_pass http://pgadmin:80;

        proxy_set_header Host "pgadmin.localhost:8888";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-Authentication-Id "ALL_IN_WONDER_USER_ID";
        proxy_set_header X-Authentication-Email "user@nocodenation.org";
        proxy_set_header X-Authentication-Name "All-In-Wonder User";
        proxy_set_header X-Authentication-Company-Id "NOCODENATION_ORG";
        proxy_set_header X-Authentication-Company-Name "NoCodeNation";
        proxy_set_header X-Authentication-Company-Domain "nocodenation.org";
        proxy_set_header X-OpenProject-User "user@nocodenation.org:ALL_IN_WONDER_USER";
    }
}

server {
    listen 8888;
    server_name postgrest.localhost;

    location / {
        # Inject API key as Bearer token if not provided by client
        proxy_set_header Authorization "Bearer API_KEY_PLACEHOLDER";

        proxy_pass http://postgrest_app:3000;
        proxy_set_header Host "postgrest.localhost:8888";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

