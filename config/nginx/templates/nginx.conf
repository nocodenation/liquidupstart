server {
    listen 8888;
    server_name openproject.localhost;

    location ^~ /custom-theme/ {
        alias /usr/share/nginx/custom-theme/;
        access_log off;
        add_header Cache-Control "no-cache";
    }

    location / {
        proxy_pass http://openproject-web:8080;

        proxy_set_header Host "openproject.localhost:8888";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-Authentication-Id "ALL_IN_WONDER_USER_ID";
        proxy_set_header X-Authentication-Email "user@nocodenation.org";
        proxy_set_header X-Authentication-Name "All-In-Wonder User";
        proxy_set_header X-Authentication-Company-Id "NOCODENATION_ORG";
        proxy_set_header X-Authentication-Company-Name "NoCodeNation";
        proxy_set_header X-Authentication-Company-Domain "nocodenation.org";
        proxy_set_header X-OpenProject-User "user@nocodenation.org:ALL_IN_WONDER_USER";
    }
}

server {
    listen 8888;
    server_name nextcloud.localhost;

    client_max_body_size 1G;

    # --- Collabora ---

    location ^~ /browser {
        proxy_pass http://collabora:9980;
        proxy_set_header Host "nextcloud.localhost:8888";
    }

    location ^~ /hosting/discovery {
        proxy_pass http://collabora:9980;
        proxy_set_header Host "nextcloud.localhost:8888";
    }

    location ^~ /hosting/capabilities {
        proxy_pass http://collabora:9980;
        proxy_set_header Host "nextcloud.localhost:8888";
    }

    location ^~ /cool/adminws {
        proxy_pass http://collabora:9980;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host "nextcloud.localhost:8888";
        proxy_http_version 1.1;
        proxy_read_timeout 36000s;
    }

    location ~ ^/cool/(.*)/ws$ {
        proxy_pass http://collabora:9980;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host "nextcloud.localhost:8888";
        proxy_http_version 1.1;
        proxy_read_timeout 36000s;
    }

    location ~ ^/(c|l)ool {
        proxy_pass http://collabora:9980;
        proxy_set_header Host "nextcloud.localhost:8888";
    }

    location / {
        proxy_pass http://nextcloud:80;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host "nextcloud.localhost:8888";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;

        proxy_set_header X-Authentication-Id "ALL_IN_WONDER_USER_ID";
        proxy_set_header X-Authentication-Email "user@nocodenation.org";
        proxy_set_header X-Authentication-Name "All-In-Wonder User";
        proxy_set_header X-Authentication-Company-Id "NOCODENATION_ORG";
        proxy_set_header X-Authentication-Company-Name "NoCodeNation";
        proxy_set_header X-Authentication-Company-Domain "nocodenation.org";
        proxy_set_header X-OpenProject-User "user@nocodenation.org:ALL_IN_WONDER_USER";
    }

    location /.well-known/carddav {
        return 301 http://nextcloud.localhost:8888/remote.php/dav;
    }

    location /.well-known/caldav {
        return 301 http://nextcloud.localhost:8888/remote.php/dav;
    }

    location ^~ /.well-known {
        return 301 http://nextcloud.localhost:8888/index.php$uri;
    }
}

server {
    listen 8833 ssl default_server;
    server_name nifi.localhost;

    ssl_certificate     /etc/nginx/certs/nifi.localhost.crt;
    ssl_certificate_key /etc/nginx/certs/nifi.localhost.key;
    ssl_protocols       TLSv1.3;

    location / {
        proxy_pass https://nifi:8833;
        proxy_ssl_verify off;
        proxy_set_header Host "nifi.localhost:8833";
        proxy_set_header X-Forwarded-Proto "https";
        proxy_set_header X-Forwarded-Host "nifi.localhost:8833";
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_http_version 1.1;

        proxy_read_timeout 300s;
        client_max_body_size 0;
    }
}

