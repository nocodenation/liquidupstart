# OpenClaw gateway/dashboard. The gateway is a long-lived WebSocket server, so
# Upgrade/Connection + extended read/send timeouts are required (OpenClaw's own
# nginx guidance: never expose 18789 directly, proxy it with WS support). The
# openclaw-gateway service no longer publishes ports — it is reachable only
# through these blocks. Bound by name, which nginx resolves at startup, so the
# openclaw-gateway service must be up (it is enabled, unlike hermes).
#
# Auth is delegated to this proxy (gateway.auth.mode = trusted-proxy in
# openclaw.json). X-Forwarded-User is the identity the gateway trusts, so the
# browser needs no token/password — same pattern as pgAdmin/OpenProject/Nextcloud
# above. The gateway only accepts this header from trusted proxy IPs
# (gateway.trustedProxies), which is why it must never publish host ports.
server {
    listen SYSTEM_HTTP_PORT;
    server_name openclaw.localhost;

    location / {
        proxy_pass http://openclaw-gateway:18789;
        proxy_set_header Host "openclaw.localhost:SYSTEM_HTTP_PORT";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "user@nocodenation.org";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_http_version 1.1;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        client_max_body_size 0;
    }
}

